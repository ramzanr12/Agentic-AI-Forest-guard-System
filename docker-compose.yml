services:
  redis:
    image: redis:7-alpine
    container_name: forest_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forest_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite+aiosqlite:////app/database/forest_guard.db
      - SECRET_KEY=${SECRET_KEY:-forest_guard_super_secret_key_2024}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-demo}
      - NEWS_API_KEY=${NEWS_API_KEY:-demo}
      - FOREST_NAME=${FOREST_NAME:-GreenShield Forest Reserve}
      - FOREST_CENTER_LAT=11.4916
      - FOREST_CENTER_LON=76.9294
      - FIRE_RISK_THRESHOLD=70
      - POACHING_RISK_THRESHOLD=60
      - OVERSTAY_HOURS=8
      - DEBUG=true
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - backend_db:/app/database
      - backend_reports:/app/reports
      - backend_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forest_frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - frontend_static:/app/static

volumes:
  redis_data:
  backend_db:
  backend_reports:
  backend_logs:
  frontend_static:
